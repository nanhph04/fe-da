<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#f7ba00",
                    "primary-fixed-dim": "#ff5b4c",
                    "primary-fixed": "#ff7668",

                    "error": "#ff6e84",

                    "on-surface-variant": "#adaaad",
                    "on-error-container": "#ffb2b9",
                    "on-tertiary-fixed-variant": "#7a0007",
                    "tertiary": "#ff7165",
                    "primary": "#ff8e80",
                    "on-secondary-container": "#fff6ec",
                    "on-background": "#f9f5f8",
                    "on-primary-fixed": "#000000",
                    "on-tertiary": "#4a0002",
                    "surface-tint": "#ff8e80",
                    "tertiary-fixed": "#ff9287",
                    "secondary-dim": "#ecb200",
                    "surface-container": "#19191c",
                    "tertiary-fixed-dim": "#ff7b6f",
                    "on-secondary": "#553e00",
                    "error-dim": "#d73357",
                    "on-tertiary-container": "#1f0000",
                    "on-error": "#490013",
                    "on-primary": "#650003",
                    "surface-dim": "#0e0e10",
                    "surface": "#0e0e10",
                    "outline": "#767577",
                    "error-container": "#a70138",
                    "inverse-on-surface": "#565457",
                    "surface-container-lowest": "#000000",
                    "inverse-primary": "#c1000c",
                    "tertiary-dim": "#ff7165",
                    "on-secondary-fixed-variant": "#674c00",
                    "on-secondary-fixed": "#443100",
                    "secondary-fixed": "#ffca4d",
                    "primary-dim": "#e80f16",
                    "on-tertiary-fixed": "#3a0002",
                    "on-surface": "#f9f5f8",
                    "secondary": "#fdc003",
                    "secondary-container": "#785900",
                    "background": "#0e0e10",
                    "inverse-surface": "#fcf8fb",
                    "tertiary-container": "#fd5046",
                    "surface-bright": "#2c2c2f",
                    "on-primary-fixed-variant": "#610003",
                    "surface-container-high": "#1f1f22",
                    "primary-container": "#ff7668",

            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.cinematic-glow {
    background: radial-gradient(circle at 50% -20%, rgba(255, 142, 128, 0.15) 0%, rgba(14, 14, 16, 0) 70%)
    }
.backdrop-image {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCqTDRHMKMPvk9xqQrk4DEF-2An9GDUaqJQRpkU-YwV71u9nAE47K5gPr58Luqvwgmn_DXqqBJL3UQx4vAlshv_DWgOnREa-PHM6Xy-py5QWKCneIxjI5p5shxD4vbmoTEatuukvovlRmpeGV6uBlRg0s_7xuLE57eUy8oATWgUXEDyA3ZlbWOF0cELXdrUg4XxnPVamIswb_2KACqvj1GXOTYblobKswobv6nYvkVeVzy4zSQ1as-oAfLpH__6ZKHo1Jlesh-bomMZ);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Suppressed TopNavBar for Focused Journey -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-8">
<div class="text-2xl font-black text-red-600 dark:text-red-500 uppercase tracking-tighter font-headline">
            Aura Cinematic
        </div>
<div class="font-headline font-bold tracking-tight text-zinc-400 hover:text-white transition-colors duration-300 cursor-pointer">
            Help
        </div>
</header>
<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden">
<!-- Cinematic Background with Tonal Depth -->
<div class="absolute inset-0 z-0">
<div class="backdrop-image absolute inset-0 opacity-20 grayscale brightness-50" data-alt="extreme wide shot of a futuristic dark empty cinema hall with rows of seats and subtle atmospheric red lighting from the screen"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/80 to-transparent"></div>
<div class="absolute inset-0 cinematic-glow"></div>
</div>
<!-- Auth Canvas -->
<div class="relative z-10 w-full max-w-md px-6">
<div class="mb-12 text-center md:text-left">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface mb-2 leading-none">
                    Welcome Back
                </h1>
<p class="font-body text-on-surface-variant text-sm tracking-wide">
                    Return to the Velvet Gallery experience.
                </p>
</div>
<section class="space-y-6">
<!-- Inputs using surface-container-lowest for recessed effect -->
<div class="space-y-4">
<div class="group">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface-variant mb-2 ml-1">
                            Email Address
                        </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-primary/50 rounded-sm py-4 px-4 text-on-surface placeholder:text-zinc-700 transition-all font-body" placeholder="name@domain.com" type="email"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600">
<span class="material-symbols-outlined">alternate_email</span>
</div>
</div>
</div>
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="block font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface-variant ml-1">
                                Password
                            </label>
<a class="font-label text-xs font-medium text-secondary hover:text-secondary-fixed-dim transition-colors uppercase tracking-widest" href="#">
                                Forgot Password?
                            </a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant/30 focus:ring-primary/50 rounded-sm py-4 px-4 text-on-surface placeholder:text-zinc-700 transition-all font-body" placeholder="••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-zinc-600">
<span class="material-symbols-outlined">lock</span>
</div>
</div>
</div>
</div>
<!-- Primary Action Button (Red Gradient) -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-5 rounded-sm font-headline font-extrabold text-sm uppercase tracking-widest shadow-xl shadow-primary/10 hover:brightness-110 active:scale-[0.98] transition-all duration-200">
                    Sign In
                </button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface px-4 text-zinc-600 font-label tracking-widest">Or continue with</span>
</div>
</div>
<!-- Secondary Social Action -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container border-none py-4 rounded-sm hover:bg-surface-bright transition-colors group">
<span class="material-symbols-outlined text-zinc-400 group-hover:text-on-surface">google</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 group-hover:text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container border-none py-4 rounded-sm hover:bg-surface-bright transition-colors group">
<span class="material-symbols-outlined text-zinc-400 group-hover:text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-zinc-400 group-hover:text-on-surface">Apple</span>
</button>
</div>
</section>
<footer class="mt-12 text-center">
<p class="font-body text-on-surface-variant text-sm">
                    New to Aura Cinematic? 
                    <a class="text-on-surface font-bold hover:text-primary transition-colors ml-1" href="#">Create an account</a>
</p>
</footer>
</div>
</main>
<!-- Suppressed Footer Links mapped from JSON style -->
<div class="fixed bottom-0 w-full flex justify-center gap-8 py-10 z-40 opacity-50 bg-transparent">
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-zinc-600 hover:text-zinc-300 transition-colors" href="#">Cookie Preferences</a>
</div>
</body></html>
